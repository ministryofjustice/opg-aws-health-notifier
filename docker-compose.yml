version: "3.6"

services:
  aws-health-notifier:
    image: 311462405659.dkr.ecr.eu-west-1.amazonaws.com/shared/aws-health-notifier:latest
    build:
      context: ./lambda

  pytest:
    image: aws-health-notifer-pytest:latest
    build:
      context: ./lambda
      dockerfile: pytest.Dockerfile
    volumes:
      - ./lambda:/app
    command: pytest
